name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_AGENT_API_BASE_URL: ${{ vars.NEXT_PUBLIC_AGENT_API_BASE_URL || 'https://social-lab-backend.onrender.com' }}
          NEXT_PUBLIC_CLOUDBASE_ENV_ID: ${{ vars.NEXT_PUBLIC_CLOUDBASE_ENV_ID || 'social-lab-d4g9g9ab34e44d7cb' }}
          NEXT_PUBLIC_CLOUDBASE_REGION: ${{ vars.NEXT_PUBLIC_CLOUDBASE_REGION || 'ap-shanghai' }}
          NEXT_PUBLIC_CLOUDBASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLOUDBASE_PUBLISHABLE_KEY || 'eyJhbGciOiJSUzI1NiIsImtpZCI6IjlkMWRjMzFlLWI0ZDAtNDQ4Yi1hNzZmLWIwY2M2M2Q4MTQ5OCJ9..qedLzQ2FZm0BZ-1Los7f4z20MlNnU2MHLLuvoPKpEroSe299CJHr-n4mdNQfu3rd0ze3byb3XiD_EG5nkGZHpaorQiFXcXyAtfaIMdSoMlZushTnTRVONTLVY9811QATwOrf41wgNXNmeiEQPAFl80qk3LLeOZFlk-jTIQNqj8Imd_EbtR61sgAWbCfl2gHTsJkPpFw6QcdtUeOK1K-haqPwamuBwEfQv7vKPS0ldTRYnWiSfjuHQDKonpzJJJpTGp5ZjrD5zGZCwdeQ2w-EHOmUmE6MixFx9086JDE5LrZPojqCTPUZVLEnS-lnZt5xWdRw2iSA1jX6L-ASQ_-UCg' }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
